type Query {
    hello: String
}

type Mutation {
    enrich(purl: String!): Component
    enrichBatch(purls: [String!]!): [Component]
}

type Component {
    type: String
    name: String
    purl: String
    supplier: Supplier
    licenses: [LicenseChoice]
}

type LicenseChoice {
    license: License
}

type License {
    id: String
    name: String
    url: String
}

type Supplier {
    name: String
    address: Address
    url: [String]
    contact: [Contact]
}

type Address {
    country: String
    region: String
    locality: String
    postOfficeBoxNumber: String
    postalCode: String
    streetAddress: String
}

type Contact {
    name: String
    email: String
    phone: String
}