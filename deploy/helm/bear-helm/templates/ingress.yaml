{{- if .Values.useTraefikLe}}
{{- if eq .Values.projectProtocol "http" }}
apiVersion: {{ .Values.traefik_crd_api_version }}
kind: IngressRoute
metadata:
  name: web-ingressroute
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
  - match: Host(`{{ .Values.leHost}}`)
    kind: Rule
    services:
    - name: {{ .Release.Name }}-backend-service
      port: "http"
{{- end }}
---
{{- if eq .Values.projectProtocol "https" }}
apiVersion: {{ .Values.traefik_crd_api_version }}
kind: IngressRoute
metadata:
  name: websecure-ingressroute
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`{{ .Values.leHost}}`)
    kind: Rule
    services:
    - name: {{ .Release.Name }}-backend-service
      port: "http"
  tls:
    certResolver: le
---
{{- end }}
{{- if .Values.traefikBehindLb}}
apiVersion: {{ .Values.traefik_crd_api_version }}
kind: IngressRoute
metadata:
  name: web-ingressroute
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
  - match: Host(`{{ .Values.leHost}}`)
    kind: Rule
    services:
    - name: {{ .Release.Name }}-backend-service
      port: "http"
{{- end }}
{{- end }}