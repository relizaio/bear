{{- if .Values.backups.db.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-bear-db-backup
  namespace: {{ .Release.Namespace }}
  labels:
    name: bear-db-backup
    app: bear
    {{- include "bear.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backups.db.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            name: bear-db-backup-pod
            {{- include "bear.selectorLabels" . | nindent 12 }}
        spec:
        {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
        {{- end }}
          restartPolicy: OnFailure
          containers:
            - name: bear-db-backup
              image: "{{ .Values.image.backups }}"
              args: ["pg", "backup"]
              env:
                - name: PG_HOST
                  value: {{ .Release.Name }}-postgresql
                - name: PG_DATABASE
                  value: postgres
                - name: PG_USER
                  value: postgres
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: pgpassword
                      key: postgres-password
                - name: DUMP_PREFIX
                  value: {{ .Values.backups.prefix }}-bear-db
                - name: BACKUP_STORAGE_TYPE
                  value: {{ .Values.backups.storageType }}
                {{- if eq .Values.backups.storageType "s3" }}
                - name: AWS_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backups.secretName }}
                      key: aws-bucket
                - name: AWS_REGION
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backups.secretName }}
                      key: aws-region
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backups.secretName }}
                      key: aws-access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backups.secretName }}
                      key: aws-secret-access-key
                {{- else if eq .Values.backups.storageType "azure" }}
                - name: AZURE_STORAGE_ACCOUNT
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backups.secretName }}
                      key: azure-storage-account
                - name: AZURE_TENANT_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backups.secretName }}
                      key: azure-tenant-id
                - name: AZURE_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backups.secretName }}
                      key: azure-client-id
                - name: AZURE_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backups.secretName }}
                      key: azure-client-secret
                - name: AZURE_CONTAINER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backups.secretName }}
                      key: azure-container
                {{- end }}
                - name: ENCRYPTION_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backups.secretName }}
                      key: encryption-password
                      optional: true
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "200m"
{{- end }}
